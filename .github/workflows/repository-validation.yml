name: Repository validation

on:
  push:
    branches:
      - main
      - scaffold/repository-foundation
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm Python runtime
        run: python3 --version

      - name: Install development dependencies
        run: python3 -m pip install -r requirements-dev.txt

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p "test_*.py"

      - name: Validate artifact dependencies
        run: python3 scripts/validate-dependencies.py

      - name: Validate source register
        run: python3 scripts/validate-source-register.py

      - name: Validate internal links
        run: python3 scripts/check-internal-links.py
