      - future market-competitiveness knowledge pack
    relevant_claims:
      - Mercer defines new-hire pay rate as the relativity between salaries offered to new staff and existing employees in the same role within an organisation.
      - A positive value indicates new hires are attracting salaries above current employees in the role; a negative value indicates the reverse.
    review_notes: The public page explains the concept but does not publish a complete reusable calculation specification; the repository must define cohort, pay basis, effective date, and aggregation method.

