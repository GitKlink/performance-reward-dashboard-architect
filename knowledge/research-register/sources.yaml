      - future fixed-reward knowledge pack
    relevant_claims:
      - Pay compression occurs when employee pay is close to that of more-experienced employees in the same job or higher-level roles.
      - Market rates outpacing historical incumbent increases can contribute to compression.
    review_notes: Use as contextual support, not as the sole source for a quantitative KPI formula.

