    author_or_organisation: Mercer Australia
    source_type: professional-market-methodology
    evidence_level: authoritative-synthesis
    url_or_doi: https://www.mercer.com/en-au/insights/total-rewards/compensation/remuneration-and-salary-trends/
    publication_date: null
